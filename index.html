<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Saúde">
<meta name="theme-color" content="#1a56a0">
<title>Monitor de Saúde</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg0:#f0f2f5;--bg1:#fff;--bg2:#f4f6f8;
  --t1:#0d1117;--t2:#5a6375;--t3:#9aa0ad;
  --bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.16);
  --blue:#1a56a0;--blue-bg:#ddeeff;--blue-t:#0a3d7a;
  --green:#1a7a3c;--green-bg:#d4f0df;--green-t:#0e4d22;
  --amber:#8a5200;--amber-bg:#fdebc8;--amber-t:#5c3600;
  --red:#b02020;--red-bg:#fad8d8;--red-t:#700f0f;
  --purple:#5a2d9e;--purple-bg:#ede8fb;--purple-t:#3d1d70;
  --teal:#0e7a6e;--teal-bg:#d0f2ee;--teal-t:#074d45;
  --sh:0 2px 12px rgba(0,0,0,.07);
}
@media(prefers-color-scheme:dark){/deep/ :root{
  --bg0:#0e1117;--bg1:#161b22;--bg2:#1e2530;
  --t1:#e6eaf0;--t2:#8b96a8;--t3:#555f6e;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --blue:#4d9de0;--blue-bg:#0d2340;--blue-t:#7bbef5;
  --green:#3db368;--green-bg:#0d2e1c;--green-t:#5dd488;
  --amber:#f0a830;--amber-bg:#2e1e05;--amber-t:#f5c060;
  --red:#e05555;--red-bg:#2e0e0e;--red-t:#f07070;
  --purple:#9b6cef;--purple-bg:#1e1040;--purple-t:#c4a5ff;
  --teal:#2bbdae;--teal-bg:#04302c;--teal-t:#5de0d4;
  --sh:0 2px 16px rgba(0,0,0,.4);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;overscroll-behavior:none}
#app{max-width:430px;margin:0 auto;min-height:100vh}

.hdr{background:linear-gradient(150deg,#0d3a7a,#1a56a0 55%,#1e6fc4);color:#fff;padding:52px 20px 22px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.hdr h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:13px;opacity:.72}
.hbadge{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600}

.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg1);border-top:.5px solid var(--bd2);display:flex;z-index:200;padding-bottom:max(env(safe-area-inset-bottom),4px);overflow-x:auto}
.nb{flex:1;min-width:52px;border:none;background:transparent;cursor:pointer;padding:9px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;color:var(--t3);font-family:inherit;transition:color .15s}
.nb i{font-size:20px}
.nb.on{color:var(--blue)}

.pg{display:none;padding:14px 13px 100px}
.pg.on{display:block}

.card{background:var(--bg1);border-radius:18px;border:.5px solid var(--bd);box-shadow:var(--sh);padding:15px 17px;margin-bottom:13px}
.ct{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:13px;display:flex;align-items:center;gap:6px}
.ct i{font-size:14px}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sg.one{grid-template-columns:1fr}
.sb{background:var(--bg2);border-radius:13px;padding:13px 10px;text-align:center}
.sl{font-size:11px;color:var(--t3);margin-bottom:4px}
.sv{font-size:29px;font-weight:700;line-height:1;color:var(--t1)}
.su{font-size:11px;color:var(--t2);margin-top:3px}
.ss{font-size:12px;color:var(--t3);text-align:center;margin-top:7px}

.f{margin-bottom:12px}
.f label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:4px}
.fi,.fs{width:100%;padding:11px 13px;border-radius:9px;border:1px solid var(--bd2);background:var(--bg2);font-size:15px;color:var(--t1);font-family:inherit;appearance:none;-webkit-appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,160,.15)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}

.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.chip{padding:7px 13px;border-radius:30px;border:1px solid var(--bd2);background:var(--bg2);font-size:13px;font-weight:500;cursor:pointer;color:var(--t2);font-family:inherit;transition:all .15s}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.btn{width:100%;padding:13px;border-radius:14px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:all .15s}
.btn:active{transform:scale(.97);opacity:.9}
.btn.green{background:var(--green)}
.btn.purple{background:var(--purple)}
.btn.teal{background:var(--teal)}
.btn.amber{background:var(--amber)}
.btn.ghost{background:var(--bg2);color:var(--t2);border:1px solid var(--bd2)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}

.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.b-normal{background:var(--green-bg);color:var(--green-t)}
.b-alerta { background:var(--amber-bg); color:var(--amber-t); }
.b-alto{background:var(--red-bg);color:var(--red-t)}
.b-baixo{background:var(--blue-bg);color:var(--blue-t)}

.li{display:flex;align-items:flex-start;padding:11px 0;border-bottom:.5px solid var(--bd)}
.li:last-child{border-bottom:none;padding-bottom:0}
.li:first-child{padding-top:0}
.ico{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;margin-right:11px;margin-top:1px}
.ico.bp{background:var(--blue-bg);color:var(--blue)}
.ico.gl{background:var(--green-bg);color:var(--green)}
.ico.wt{background:var(--teal-bg);color:var(--teal)}
.ico.med{background:var(--purple-bg);color:var(--purple)}
.ico.cot{background:var(--amber-bg);color:var(--amber)}
.lb{flex:1;min-width:0}
.lv{font-size:15px;font-weight:700;color:var(--t1)}
.lm{font-size:12px;color:var(--t3);margin-top:1px}
.ln{font-size:11px;color:var(--t2);background:var(--bg2);border-radius:6px;padding:2px 8px;display:inline-block;margin-top:4px}
.la{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;margin-left:8px}
.ibtn{background:none;border:none;cursor:pointer;padding:5px;border-radius:7px;color:var(--t3);font-size:18px;display:flex;align-items:center;justify-content:center}
.ibtn:active{background:var(--bd2)}

.mchart{display:flex;align-items:flex-end;gap:4px;height:58px;margin-top:9px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bbar{width:100%;border-radius:4px 4px 0 0;min-height:3px}
.blbl{font-size:9px;color:var(--t3)}

.sched-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--bd)}
.sched-row:last-child{border-bottom:none}
.btn-take{background:var(--blue-bg);color:var(--blue-t);border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-take:active{transform:scale(.95)}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1f2e;color:#e6eaf0;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.frow{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.fb{flex:1;min-width:70px;padding:9px 4px;border-radius:9px;border:1px solid var(--bd2);background:var(--bg2);font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);font-family:inherit;transition:all .15s;text-align:center}
.fb.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.dbs{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t3);margin-bottom:13px;padding:8px 12px;background:var(--bg1);border-radius:9px;border:.5px solid var(--bd)}
.dbd{width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;transition:background .4s}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--bg1);border-radius:20px 20px 0 0;padding:20px 18px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding-bottom:max(env(safe-area-inset-bottom),20px)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:var(--bg2);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--t2)}

.med-card{background:var(--bg1);border-radius:16px;border:.5px solid var(--bd);box-shadow:var(--sh);padding:14px 16px;margin-bottom:12px}
.med-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.med-ico{width:44px;height:44px;border-radius:12px;background:var(--purple-bg);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.med-name{font-size:16px;font-weight:700;color:var(--t1)}
.med-dose{font-size:13px;color:var(--t2);margin-top:1px}
.med-times{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.med-time-tag{background:var(--purple-bg);color:var(--purple-t);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:600}
.med-imgs{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.med-img{width:64px;height:64px;border-radius:9px;object-fit:cover;cursor:pointer;border:.5px solid var(--bd2)}
.med-actions{display:flex;gap:7px;margin-top:10px}
.med-btn{flex
